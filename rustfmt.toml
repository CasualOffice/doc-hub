edition = "2021"
max_width = 100
hard_tabs = false
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"
reorder_imports = true
reorder_modules = true
remove_nested_parens = true
match_block_trailing_comma = false
# `imports_granularity` and `group_imports` are nightly-only — left out so
# stable rustfmt --check stays clean in CI. Re-enable with a `rustfmt-nightly`
# job if we ever want them.
