<svg viewBox="0 0 172 172" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Casual Drive mark</title>
  <desc>The Casual Drive mark on its own — a rounded square with a cloud silhouette, intended for chrome, favicons, and inline use.</desc>

  <defs>
    <clipPath id="cd-mark-only-clip">
      <rect x="0" y="0" width="172" height="172" rx="40"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cd-mark-only-clip)">
    <rect width="172" height="172" fill="currentColor"/>
    <g fill="var(--mark-fg, #F5F3EE)">
      <circle cx="54"  cy="100" r="23"/>
      <circle cx="118" cy="100" r="23"/>
      <circle cx="86"  cy="68"  r="34"/>
      <rect   x="54"   y="100"  width="64" height="23"/>
    </g>
  </g>
</svg>
