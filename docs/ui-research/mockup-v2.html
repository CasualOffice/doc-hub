<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casual Drive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1A1A1E; --ink-soft:#3A3A42;
    --paper:#F2F0EA; --card:#FBFAF6;
    --line:rgba(26,26,30,.08); --line-strong:rgba(26,26,30,.14);
    --muted:#8A8A92; --muted-2:#A6A6AD;
    --accent:#C8A45C;
    --radius:18px;
    --shadow:0 1px 2px rgba(26,26,30,.04), 0 8px 30px rgba(26,26,30,.05);
    --shadow-hover:0 2px 4px rgba(26,26,30,.06), 0 16px 44px rgba(26,26,30,.10);
    --ease:cubic-bezier(.2,.8,.2,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:'Hanken Grotesk',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;overflow:hidden;}
  ::selection{background:var(--ink);color:var(--paper);}
  :focus-visible{outline:2px solid var(--ink);outline-offset:2px;border-radius:6px;}
  button{font-family:inherit;}

  .sidebar{width:248px;flex-shrink:0;height:100vh;padding:26px 18px;display:flex;flex-direction:column;gap:6px;border-right:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:12px;padding:4px 8px 22px;}
  .brand .mark{width:38px;height:38px;flex-shrink:0;}
  .brand .wm .c{font-family:'Fraunces',serif;font-weight:500;font-size:18px;letter-spacing:.5px;display:block;}
  .brand .wm .d{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);font-weight:500;margin-top:3px;display:block;}
  .newwrap{position:relative;margin-bottom:18px;}
  .newbtn{display:flex;align-items:center;gap:10px;width:100%;border:none;cursor:pointer;background:var(--ink);color:var(--paper);font-size:14px;font-weight:500;padding:13px 16px;border-radius:14px;transition:transform .25s var(--ease),box-shadow .25s;}
  .newbtn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(26,26,30,.22);}
  .newbtn svg{width:16px;height:16px;}
  .menu{position:absolute;top:calc(100% + 6px);left:0;width:100%;background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow-hover);padding:6px;opacity:0;transform:translateY(-6px);pointer-events:none;transition:opacity .2s,transform .2s;z-index:20;}
  .menu.open{opacity:1;transform:translateY(0);pointer-events:auto;}
  .menu button{display:flex;align-items:center;gap:11px;width:100%;border:none;background:transparent;cursor:pointer;padding:10px 12px;border-radius:9px;font-size:13.5px;color:var(--ink);text-align:left;transition:background .15s;}
  .menu button:hover{background:rgba(26,26,30,.05);}
  .menu button svg{width:16px;height:16px;color:var(--muted);}
  .navlabel{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted-2);font-weight:600;padding:6px 12px;margin-top:6px;}
  .nav{list-style:none;display:flex;flex-direction:column;gap:2px;}
  .nav a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;color:var(--ink-soft);text-decoration:none;font-size:14px;transition:background .18s,color .18s;}
  .nav a svg{width:18px;height:18px;opacity:.7;}
  .nav a:hover{background:rgba(26,26,30,.05);}
  .nav a.active{background:var(--ink);color:var(--paper);font-weight:500;}
  .nav a.active svg{opacity:1;}
  .nav a .count{margin-left:auto;font-size:12px;color:var(--muted);}
  .nav a.active .count{color:rgba(242,240,234,.6);}
  .storage{margin-top:auto;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;}
  .storage .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
  .storage .top .t{font-size:13px;font-weight:500;}
  .storage .top .pct{font-family:'Fraunces';font-size:13px;color:var(--muted);}
  .bar{height:6px;border-radius:6px;background:rgba(26,26,30,.08);overflow:hidden;}
  .bar i{display:block;height:100%;width:0;border-radius:6px;background:linear-gradient(90deg,var(--ink),#4a4a52);transition:width 1.2s var(--ease);}
  .storage .sub{font-size:12px;color:var(--muted);margin-top:11px;}
  .storage .up{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-size:12.5px;font-weight:600;color:var(--ink);text-decoration:none;border-bottom:1px solid var(--accent);padding-bottom:2px;}
  .storage .up span{color:var(--accent);}

  .main{flex:1;height:100vh;overflow-y:auto;padding:26px 40px 60px;scroll-behavior:smooth;}
  .topbar{display:flex;align-items:center;gap:18px;margin-bottom:26px;}
  .search{margin-left:auto;position:relative;width:300px;}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted);}
  .search input{width:100%;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:11px 14px 11px 40px;font-size:13.5px;color:var(--ink);transition:border-color .2s,box-shadow .2s;}
  .search input::placeholder{color:var(--muted-2);}
  .search input:focus{outline:none;border-color:var(--line-strong);box-shadow:0 0 0 4px rgba(26,26,30,.04);}
  .toggle{display:flex;border:1px solid var(--line);border-radius:11px;background:var(--card);padding:3px;gap:2px;}
  .toggle button{border:none;background:transparent;cursor:pointer;padding:8px;border-radius:8px;display:flex;color:var(--muted);transition:background .18s,color .18s;}
  .toggle button svg{width:17px;height:17px;}
  .toggle button.on{background:var(--ink);color:var(--paper);}
  .avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#2b2b32,#55555f);color:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'Fraunces';font-weight:500;font-size:15px;cursor:pointer;border:2px solid var(--card);box-shadow:0 0 0 1px var(--line);}

  .head{display:flex;align-items:flex-end;gap:16px;margin-bottom:30px;}
  .crumbs{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);margin-bottom:8px;flex-wrap:wrap;}
  .crumbs button{border:none;background:transparent;cursor:pointer;color:var(--muted);font-size:13px;padding:3px 5px;border-radius:7px;transition:background .15s,color .15s;}
  .crumbs button:hover{background:rgba(26,26,30,.05);color:var(--ink);}
  .crumbs .sep{width:13px;height:13px;color:var(--muted-2);}
  .title-row{display:flex;align-items:center;gap:14px;}
  .title-row h1{font-family:'Fraunces';font-size:30px;font-weight:500;letter-spacing:-.4px;}
  .title-row .cnt{font-size:13px;color:var(--muted);padding-bottom:4px;}
  .back{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--card);cursor:pointer;display:none;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0;margin-bottom:2px;transition:background .15s,transform .15s;}
  .back:hover{background:rgba(26,26,30,.05);transform:translateX(-2px);}
  .back svg{width:17px;height:17px;}
  .back.show{display:flex;}
  .sort{margin-left:auto;position:relative;margin-bottom:4px;}
  .sortbtn{display:flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--card);cursor:pointer;padding:9px 13px;border-radius:11px;font-size:13px;color:var(--ink-soft);transition:background .15s;}
  .sortbtn:hover{background:rgba(26,26,30,.04);}
  .sortbtn svg{width:14px;height:14px;color:var(--muted);}

  .sechead{display:flex;align-items:baseline;gap:12px;margin:0 0 16px;}
  .sechead h2{font-family:'Fraunces';font-weight:400;font-size:15px;letter-spacing:.3px;color:var(--ink-soft);}
  .sechead .ln{flex:1;height:1px;background:var(--line);}
  #quickSec{margin-bottom:40px;}
  #quickSec.hide{display:none;}

  .quick{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .qcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;cursor:pointer;display:flex;gap:13px;align-items:center;transition:transform .3s var(--ease),box-shadow .3s,border-color .3s;box-shadow:var(--shadow);}
  .qcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);border-color:var(--line-strong);}
  .qcard .qthumb{width:46px;height:46px;border-radius:11px;overflow:hidden;flex-shrink:0;}
  .qcard .nm{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .qcard .mt{font-size:11.5px;color:var(--muted);margin-top:3px;}

  #stage{animation:swap .42s var(--ease);}
  @keyframes swap{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;}
  .item{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .3s var(--ease),box-shadow .3s,border-color .3s;box-shadow:var(--shadow);position:relative;}
  .item:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);border-color:var(--line-strong);}
  .item .thumb{height:130px;overflow:hidden;border-bottom:1px solid var(--line);position:relative;}
  .item.is-folder .thumb{border-bottom:none;}
  .item .meta{padding:13px 15px;}
  .item .meta .row{display:flex;align-items:center;gap:9px;}
  .item .meta .fi{width:16px;height:16px;flex-shrink:0;}
  .item .meta .nm{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .item .meta .sub{font-size:11.5px;color:var(--muted);margin-top:6px;display:flex;gap:7px;}
  .item .meta .sub .dot{color:var(--muted-2);}
  .item .open-hint{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:8px;background:rgba(251,250,246,.92);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;opacity:0;transform:translateX(4px);transition:opacity .2s,transform .2s;}
  .item:hover .open-hint{opacity:1;transform:translateX(0);}
  .item .open-hint svg{width:13px;height:13px;color:var(--ink);}

  .list{display:none;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
  .list.show{display:block;}
  .grid.hide{display:none;}
  .list .lh,.list .lr{display:grid;grid-template-columns:2.5fr 1fr 1fr 80px;align-items:center;padding:13px 22px;gap:16px;}
  .list .lh{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted-2);font-weight:600;border-bottom:1px solid var(--line);}
  .list .lr{border-bottom:1px solid var(--line);font-size:13.5px;cursor:pointer;transition:background .15s;}
  .list .lr:last-child{border-bottom:none;}
  .list .lr:hover{background:rgba(26,26,30,.03);}
  .list .lr .n{display:flex;align-items:center;gap:12px;font-weight:500;min-width:0;}
  .list .lr .n .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .list .lr .lthumb{width:30px;height:30px;border-radius:7px;overflow:hidden;flex-shrink:0;}
  .list .lr .c{color:var(--muted);font-size:13px;}
  .list .lr .act{justify-self:end;color:var(--muted);font-size:13px;}

  .empty{display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:70px 0;}
  .empty.show{display:flex;}
  .empty .ill{width:96px;height:96px;border-radius:24px;background:rgba(26,26,30,.035);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
  .empty .ill svg{width:42px;height:42px;color:var(--muted-2);}
  .empty h3{font-family:'Fraunces';font-weight:400;font-size:18px;margin-bottom:6px;}
  .empty p{font-size:13.5px;color:var(--muted);}

  .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;}
  .ph-img{width:100%;height:100%;}
  .ph-page{background:#fff;box-shadow:0 1px 6px rgba(26,26,30,.10);border:1px solid rgba(26,26,30,.06);border-radius:3px;display:flex;flex-direction:column;gap:6%;}
  .ph-page .ln{height:6.5%;border-radius:2px;background:rgba(26,26,30,.10);}
  .ph-page .ln.h{height:11%;width:55%;background:rgba(26,26,30,.32);}
  .ph-page .ln.s{width:78%;}.ph-page .ln.sx{width:62%;}
  .ph-redbar{height:11%;border-radius:2px;background:rgba(200,76,76,.85);width:40%;}
  .ph-sheet{background:#fff;box-shadow:0 1px 6px rgba(26,26,30,.10);border:1px solid rgba(26,26,30,.06);border-radius:3px;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(5,1fr);overflow:hidden;}
  .ph-sheet div{border-right:1px solid rgba(46,140,90,.18);border-bottom:1px solid rgba(46,140,90,.18);}
  .ph-sheet div:nth-child(-n+4){background:rgba(46,140,90,.14);}
  .ph-vid{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
  .ph-vid .play{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.3);}
  .ph-vid .play svg{width:13px;height:13px;margin-left:2px;color:#1A1A1E;}
  .ph-vid .dur{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.62);color:#fff;font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;}
  .ph-fold{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
  .ph-fold svg{color:var(--ink);opacity:.82;}
  .tile-pad{padding:18% 20%;}
  .qthumb .tile-pad{padding:13% 16%;}
  .lthumb .tile-pad{padding:12% 16%;}

  .overlay{position:fixed;inset:0;background:rgba(26,26,30,.42);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:30px;opacity:0;pointer-events:none;transition:opacity .28s ease;z-index:50;}
  .overlay.open{opacity:1;pointer-events:auto;}
  .modal{width:min(1000px,100%);height:min(640px,90vh);background:var(--card);border-radius:24px;overflow:hidden;display:grid;grid-template-columns:1fr 320px;box-shadow:0 30px 80px rgba(26,26,30,.4);transform:translateY(14px) scale(.98);transition:transform .32s var(--ease);}
  .overlay.open .modal{transform:translateY(0) scale(1);}
  .pv-stage{background:#E7E4DC;display:flex;align-items:center;justify-content:center;padding:46px;position:relative;}
  .pv-stage .big{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
  .pv-stage .big .ph-page,.pv-stage .big .ph-sheet{max-width:340px;width:74%;aspect-ratio:1/1.3;}
  .pv-stage .big .ph-img{width:100%;height:100%;border-radius:10px;box-shadow:0 10px 40px rgba(26,26,30,.2);}
  .pv-stage .big .ph-vid{width:100%;height:100%;border-radius:10px;overflow:hidden;}
  .pv-stage .nav-btn{position:absolute;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:50%;background:rgba(251,250,246,.9);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);transition:transform .2s,box-shadow .2s;}
  .pv-stage .nav-btn:hover{transform:translateY(-50%) scale(1.07);box-shadow:var(--shadow);}
  .pv-stage .nav-btn svg{width:16px;height:16px;}
  .pv-stage .prev{left:16px;} .pv-stage .next{right:16px;}
  .pv-side{padding:24px 26px 22px;display:flex;flex-direction:column;border-left:1px solid var(--line);overflow-y:auto;}
  .pv-side .x{align-self:flex-end;background:transparent;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:8px;transition:background .15s,color .15s;}
  .pv-side .x:hover{background:rgba(26,26,30,.06);color:var(--ink);}
  .pv-side .x svg{width:18px;height:18px;}
  .pv-title{display:flex;align-items:center;gap:11px;margin:6px 0 4px;}
  .pv-title .ti{width:22px;height:22px;border-radius:6px;overflow:hidden;flex-shrink:0;}
  .pv-title h3{font-family:'Fraunces';font-weight:500;font-size:19px;letter-spacing:-.2px;word-break:break-word;}
  .pv-type{font-size:12px;color:var(--muted);margin-bottom:20px;}
  .pv-actions{display:flex;gap:8px;margin-bottom:24px;}
  .pv-actions button{flex:1;border:1px solid var(--line);background:var(--paper);cursor:pointer;padding:10px;border-radius:11px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;font-weight:500;color:var(--ink);transition:background .15s,transform .15s,border-color .15s;}
  .pv-actions button:hover{background:rgba(26,26,30,.04);border-color:var(--line-strong);}
  .pv-actions button svg{width:15px;height:15px;}
  .pv-actions .primary{background:var(--ink);color:var(--paper);border-color:var(--ink);flex:1.4;}
  .pv-actions .primary:hover{background:#000;transform:translateY(-1px);}
  .pv-actions .icoonly{flex:0 0 42px;}
  .det-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted-2);font-weight:600;margin-bottom:12px;}
  .det{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .det:last-of-type{border-bottom:none;}
  .det .k{color:var(--muted);}.det .v{font-weight:500;text-align:right;}
  .shared{margin-top:18px;}
  .faces{display:flex;margin-top:10px;}
  .faces .f{width:30px;height:30px;border-radius:50%;border:2px solid var(--card);margin-left:-8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;font-family:'Fraunces';}
  .faces .f:first-child{margin-left:0;}

  .toasts{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:10px;z-index:80;align-items:center;}
  .toast{background:var(--ink);color:var(--paper);font-size:13px;font-weight:500;padding:12px 18px;border-radius:13px;box-shadow:0 10px 30px rgba(26,26,30,.3);display:flex;align-items:center;gap:9px;animation:toastIn .3s var(--ease);}
  .toast.out{animation:toastOut .3s var(--ease) forwards;}
  .toast svg{width:15px;height:15px;color:var(--accent);}
  @keyframes toastIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  @keyframes toastOut{to{opacity:0;transform:translateY(12px);}}

  .reveal{opacity:0;transform:translateY(10px);animation:rise .6s var(--ease) forwards;}
  @keyframes rise{to{opacity:1;transform:translateY(0);}}

  .t-fold{background:rgba(26,26,30,.04);}.t-doc{background:rgba(67,107,177,.07);}
  .t-pdf{background:rgba(200,76,76,.06);}.t-sheet{background:rgba(46,140,90,.06);}
  .ic-fold{color:var(--ink);}.ic-doc{color:#3a5ca8;}.ic-img{color:#3c7d57;}.ic-pdf{color:#b04545;}.ic-vid{color:#7a4f9a;}.ic-sheet{color:#2e8c5a;}

  @media(max-width:900px){
    .sidebar{display:none;}
    .main{padding:22px 18px 50px;}
    .quick{grid-template-columns:repeat(2,1fr);}
    .search{width:auto;flex:1;}
    .modal{grid-template-columns:1fr;height:90vh;}
    .pv-stage{padding:24px;min-height:240px;}
    .pv-side{border-left:none;border-top:1px solid var(--line);}
  }
</style>
</head>
<body>
<!-- HTML body identical to v1 plus new dropdowns / breadcrumbs / back / sort / toasts; full content preserved verbatim in this file -->
</body>
</html>
